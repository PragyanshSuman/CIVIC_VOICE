apiVersion: apps/v1
kind: Deployment
metadata:
  name: civic-backend
  labels:
    app: civic-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: civic-backend
  template:
    metadata:
      labels:
        app: civic-backend
    spec:
      containers:
      - name: backend
        image: civic-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: civic-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: civic-secrets
              key: jwt-secret
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: civic-backend-service
spec:
  selector:
    app: civic-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
